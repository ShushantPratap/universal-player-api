<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester | Universal Video Resolver</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --red: #E50914; --dark: #141414; --gray: #2f2f2f; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .test-card { background: var(--gray); padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: var(--red); font-size: 1.5rem; text-align: center; }
        .input-group { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: none; background: #111; color: white; outline: 1px solid #444; }
        input:focus { outline: 1px solid var(--red); }
        button { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #b20710; transform: scale(1.02); }
        button:disabled { background: #777; cursor: not-allowed; }
        
        .result-section { margin-top: 25px; display: none; }
        .status { font-size: 0.9rem; margin-bottom: 10px; }
        pre { background: #000; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 0.8rem; color: #00ff00; border: 1px solid #333; }
        video { width: 100%; margin-top: 20px; border-radius: 6px; border: 1px solid #444; display: none; }
        
        .loader { display: none; text-align: center; margin: 10px 0; color: var(--red); }
    </style>
</head>
<body>

    <div class="test-card">
        <h2><i class="fas fa-vial"></i> API Debugger</h2>
        <p style="font-size: 0.8rem; text-align: center; color: #aaa;">Target: http://localhost:3000/api/resolve</p>

        <div class="input-group">
            <input type="text" id="test-url" placeholder="Paste YouTube/Instagram link here...">
            <button id="run-test">Run Test</button>
        </div>

        <div class="loader" id="test-loader">
            <i class="fas fa-spinner fa-spin"></i> Processing with yt-dlp...
        </div>

        <div class="result-section" id="result-section">
            <div class="status" id="test-status"></div>
            <p><strong>Response Metadata:</strong></p>
            <pre id="json-output"></pre>
            
            <p style="margin-top: 15px;"><strong>Video Preview:</strong></p>
            <video id="test-video" controls></video>
        </div>
    </div>

    <script>
        const btn = document.getElementById('run-test');
        const urlInput = document.getElementById('test-url');
        const loader = document.getElementById('test-loader');
        const resultSection = document.getElementById('result-section');
        const jsonOutput = document.getElementById('json-output');
        const videoPreview = document.getElementById('test-video');
        const status = document.getElementById('test-status');

        btn.addEventListener('click', async () => {
            const videoUrl = urlInput.value.trim();
            if(!videoUrl) return alert("Please enter a URL");

            // UI Reset
            btn.disabled = true;
            loader.style.display = 'block';
            resultSection.style.display = 'none';
            videoPreview.style.display = 'none';
            videoPreview.src = "";

            try {
                // IMPORTANT: Ensure the URL is sent as a clean string in a JSON object
                const response = await fetch("https://universal-player-api.vercel.app/api/resolve", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: videoUrl }) 
                });

                const data = await response.json();

                loader.style.display = 'none';
                resultSection.style.display = 'block';
                btn.disabled = false;

                if(response.ok) {
                    status.innerHTML = '<span style="color: #00ff00;"><i class="fas fa-check-circle"></i> Success (200 OK)</span>';
                    jsonOutput.textContent = JSON.stringify(data, null, 4);
                    
                    if(data.src) {
                        videoPreview.src = data.src;
                        videoPreview.style.display = 'block';
                    }
                } else {
                    status.innerHTML = '<span style="color: #ff4444;"><i class="fas fa-exclamation-triangle"></i> Error (' + response.status + ')</span>';
                    jsonOutput.textContent = JSON.stringify(data, null, 4);
                }

            } catch (err) {
                loader.style.display = 'none';
                resultSection.style.display = 'block';
                btn.disabled = false;
                status.innerHTML = '<span style="color: #ff4444;"><i class="fas fa-bug"></i> Fetch Failed</span>';
                jsonOutput.textContent = "Network Error: Is the backend server running at localhost:3000?\n\nDetails: " + err.message;
            }
        });
    </script>
</body>
</html>
